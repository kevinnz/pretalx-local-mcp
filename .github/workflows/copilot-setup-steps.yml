name: "Copilot Setup Steps"

# Run automatically when this file changes to validate it, and allow manual
# testing from the repository Actions tab.
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # The job MUST be called `copilot-setup-steps` or it will not be picked up by Copilot.
  copilot-setup-steps:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install project dependencies
        # Only run once pyproject.toml exists; on a fresh repo this step is skipped.
        run: |
          if [ -f pyproject.toml ]; then
            uv sync --dev
          else
            echo "pyproject.toml not found — skipping dependency install (Copilot will create it)"
          fi
